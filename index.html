<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pharmacy Store</title>
<link rel="stylesheet" href="cssFile/globalStyles.css">
</head>

<body>

  

<nav>
<a href="#">My Pharmacy Store</a>

<ul>
  <li><a href="index.html">Home</a></li>
  <li><a href="pages/services.html">Services</a></li>
  <li><a href="pages/contact.html">Contact</a></li>
  <li><a href="pages/signup.html">Signup</a></li>
</ul>
</nav>

<div class="page">

<h2>Categories</h2>
<div class="cat-box" onclick="filterCategory('tablets')">Tablets</div>
<div class="cat-box" onclick="filterCategory('syrups')">Syrups</div>
<div class="cat-box" onclick="filterCategory('vitamins')">Vitamins</div>
<div class="cat-box" onclick="filterCategory('baby-care')">Baby Care</div>

<h2>Our Products</h2>

<div class="card-container">

<div class="card product tablets">
<img src="sources/panadol.png" alt="Panadol">
<h3>Panadol</h3>
<p>Rs 50</p>
<button onclick="addItem('Panadol', 50)">Add to Cart</button>
  
</div>

<div class="card product syrups">
<img src="sources/syrup.png" alt="Syrup">
<h3>Syrup</h3>
<p>Rs 120</p>
<button onclick="addItem('Syrup', 120)">Add to Cart</button>
</div>

<div class="card product vitamins ">
<img src="sources/vitamins.png" alt="Vitamins">
<h3>Vitamins</h3>
<p>Rs 200</p>
<button onclick="addItem('Vitamins', 200)">Add to Cart</button>
</div>

<div class="card product baby-care">
<img src="sources/babycare.png" alt="Baby Care">
<h3>Baby Care</h3>
<p>Rs 500</p>
<button onclick="addItem('Baby Care', 500)">Add to Cart</button>
</div>
</div>


<footer>
<p>Contact: pharmacy@gmail.com</p>
<p>Phone: 0300-1234567</p>
</footer>

<script src="js/functions.js"></script>

</div>
</body>
</html>
